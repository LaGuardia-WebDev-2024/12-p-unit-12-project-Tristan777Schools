      $("#math1-form").on("submit", function (event) {

 $("#math-1").attr("src", "https://www.freeiconspng.com/thumbs/checkmark-png/checkmark-png-5.png");

        }
        $("#math1-text").fadeIn(500);
        $("#math1-text").animate({
          width: "400px",
          marginLeft: "250px",
          borderWidth: "300px"
        }, 1500);
        $("#math-1").fadeIn(500);
        $("#math1-bad").fadeIn(500);
      });
